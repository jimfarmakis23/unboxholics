<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>YouTube Videos - Dark Mode (Optimized)</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root{
      --bg:#1a1a1a;
      --card:#2d2d2d;
      --text:#fff;
      --muted:rgba(255,255,255,.78);
      --danger:#ff6b6b;
      --focus:#9bd1ff;
    }

    body {
      background-color: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: var(--text);
    }

    h1 {
      text-align: center;
      margin-bottom: 26px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 1px;
    }

    #video-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      max-width: 1680px;
      margin: 0 auto;
    }

    .video-card {
      background-color: var(--card);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.4);
    }

    /* 16:10 */
    .video-media {
      position: relative;
      width: 100%;
      padding-bottom: 62.5%;
      background: #000;
    }
    .video-media iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .video-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      outline: none;
    }
    .video-thumb:focus-visible {
      box-shadow: 0 0 0 3px rgba(0,0,0,.55), 0 0 0 5px var(--focus);
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05) contrast(1.05);
    }

    /* Play overlay */
    .video-thumb::after {
      content: "";
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
      position: absolute;
    }
    .video-thumb::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 18px solid #fff;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      transform: translateX(4px);
      z-index: 1;
    }
    .video-thumb:hover::after { background: rgba(0,0,0,0.7); }

    .video-title {
      color: var(--text);
      padding: 10px 12px 12px;
      font-size: 0.95rem;
      line-height: 1.25rem;
      font-weight: 400;
      opacity: 0.95;

      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.25rem * 2);
    }

    .loading, .error-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--text);
      background-color: var(--card);
      border-radius: 12px;
      font-size: 1.1rem;
    }
    .error-message {
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .mini-error {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 14px;
      text-align: center;
      color: #ffd0d0;
      background: rgba(0,0,0,0.68);
      font-size: 0.95rem;
      line-height: 1.25rem;
    }
    .mini-error a{
      color: #ffffff;
      text-decoration: underline;
      opacity: .95;
    }

    @media screen and (max-width: 1024px) {
      #video-container { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }
    @media screen and (max-width: 480px) {
      body { padding: 10px; }
      #video-container { grid-template-columns: 1fr; gap: 15px; }
      h1 { margin-bottom: 18px; }
    }

    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #2d2d2d; }
    ::-webkit-scrollbar-thumb { background: #666; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #888; }
  </style>
</head>

<body>
  <h1>YouTube Videos (Optimized)</h1>

  <div id="video-container">
    <div class="loading">Φόρτωση βίντεο...</div>
  </div>

  <script>
    // -----------------------------
    // URL -> Video ID
    // -----------------------------
    function getVideoId(url) {
      try {
        url = url.trim();
        const patterns = [
          /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
          /youtube\.com\/watch\?.+&v=([^&\n?#]+)/
        ];
        for (const pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }
        const urlObj = new URL(url);
        return urlObj.searchParams.get('v');
      } catch {
        return null;
      }
    }

    // -----------------------------
    // Fetch with timeout
    // -----------------------------
    function timeoutFetch(url, ms = 3500, opts = {}) {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(t));
    }

    // -----------------------------
    // Invidious instances (updated + fallback)
    // NOTE: instances αλλάζουν συχνά, γι' αυτό κάνουμε health-check.
    // -----------------------------
    const INVIDIOUS_INSTANCES = [
      "https://yewtu.be",
      "https://invidious.privacydev.net",
      "https://inv.nadeko.net",
      "https://invidious.lunar.icu",
      "https://vid.puffyan.us",
      "https://invidious.protokolla.fi"
    ];

    let ACTIVE_INSTANCE = null;

    async function pickWorkingInstance() {
      for (const base of INVIDIOUS_INSTANCES) {
        try {
          const res = await timeoutFetch(`${base}/api/v1/stats`, 2200, { cache: "no-store" });
          if (res.ok) return base;
        } catch {}
      }
      return null;
    }

    function buildEmbedSrc(instance, videoId) {
      const params = new URLSearchParams({
        autoplay: "1",
        rel: "0",
        modestbranding: "1",
        playsinline: "1"
      });
      return `${instance}/embed/${videoId}?${params.toString()}`;
    }

    // -----------------------------
    // Titles via YouTube oEmbed
    // -----------------------------
    const titleCache = new Map();
    async function fetchTitle(videoId) {
      if (titleCache.has(videoId)) return titleCache.get(videoId);

      const oembedUrl =
        `https://www.youtube.com/oembed?url=${encodeURIComponent("https://www.youtube.com/watch?v=" + videoId)}&format=json`;

      try {
        const res = await timeoutFetch(oembedUrl, 5000, { cache: "no-store" });
        if (!res.ok) throw new Error("oEmbed failed");
        const data = await res.json();
        const title = (data && data.title) ? data.title : "YouTube Video";
        titleCache.set(videoId, title);
        return title;
      } catch {
        const fallback = "YouTube Video";
        titleCache.set(videoId, fallback);
        return fallback;
      }
    }

    // -----------------------------
    // Load links (cache bust)
    // -----------------------------
    async function loadLinksText() {
      const url = `data/links.txt?v=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`Το αρχείο data/links.txt δεν βρέθηκε (Status: ${res.status})`);
      return await res.text();
    }

    // -----------------------------
    // Main init
    // -----------------------------
    (async function init() {
      const container = document.getElementById('video-container');

      // Αν είναι file:// θα σπάσει το fetch
      if (location.protocol === "file:") {
        container.innerHTML = `
          <div class="error-message">
            ❌ Ανοίγεις ως <b>file://</b> και μπλοκάρεται το fetch("data/links.txt").<br><br>
            ✅ Άνοιξέ το από GitHub Pages ή τρέξε local server (π.χ. VS Code Live Server).
          </div>`;
        return;
      }

      // Βρες instance που απαντάει
      ACTIVE_INSTANCE = await pickWorkingInstance();
      if (!ACTIVE_INSTANCE) {
        container.innerHTML = `
          <div class="error-message">
            ❌ Δεν βρέθηκε διαθέσιμο Invidious instance αυτή τη στιγμή.<br>
            Δοκίμασε αργότερα ή άλλαξε τη λίστα instances.
          </div>`;
        return;
      }

      let text;
      try {
        text = await loadLinksText();
      } catch (err) {
        container.innerHTML = `
          <div class="error-message">
            ❌ Σφάλμα: ${err.message}<br><br>
            Βεβαιώσου ότι:<br>
            1) Υπάρχει το <b>data/links.txt</b><br>
            2) Το <b>index.html</b> είναι στο root<br>
            3) Έχεις ένα link ανά γραμμή
          </div>`;
        return;
      }

      const links = text.split('\n')
        .map(line => line.trim())
        .filter(line => line && !line.startsWith('#'));

      if (links.length === 0) {
        container.innerHTML = '<div class="error-message">Δεν βρέθηκαν links στο αρχείο</div>';
        return;
      }

      container.innerHTML = '';

      // Lazy-load thumbs + titles
      const observer = new IntersectionObserver((entries, obs) => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;

          const thumb = entry.target;
          const videoId = thumb.dataset.videoId;
          const titleEl = document.getElementById(`title-${thumb.dataset.idx}`);

          // Thumbnail
          if (!thumb.dataset.thumbLoaded) {
            const img = document.createElement('img');
            const maxres = `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
            const hq = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
            img.loading = "lazy";
            img.decoding = "async";
            img.referrerPolicy = "no-referrer";
            img.src = maxres;
            img.onerror = () => { img.src = hq; };
            thumb.appendChild(img);
            thumb.dataset.thumbLoaded = "1";
          }

          // Title
          if (titleEl && !titleEl.dataset.titleLoaded) {
            titleEl.dataset.titleLoaded = "1";
            fetchTitle(videoId).then(t => {
              titleEl.textContent = t;
              // κάνε και το aria-label πιο χρήσιμο
              thumb.setAttribute("aria-label", `Play: ${t}`);
            });
          }

          obs.unobserve(thumb);
        }
      }, { root: null, rootMargin: "500px", threshold: 0.01 });

      async function loadIframeWithFallback(media, videoId) {
        const candidates = [ACTIVE_INSTANCE, ...INVIDIOUS_INSTANCES.filter(x => x !== ACTIVE_INSTANCE)];

        for (const inst of candidates) {
          try {
            // health check
            const stats = await timeoutFetch(`${inst}/api/v1/stats`, 1800, { cache: "no-store" });
            if (!stats.ok) continue;

            const iframe = document.createElement('iframe');
            iframe.src = buildEmbedSrc(inst, videoId);
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;
            iframe.loading = "eager";
            iframe.title = "Video player";

            // best-effort load check
            await new Promise((resolve, reject) => {
              const t = setTimeout(() => reject(new Error("embed timeout")), 3500);
              iframe.onload = () => { clearTimeout(t); resolve(); };
              iframe.onerror = () => { clearTimeout(t); reject(new Error("iframe error")); };
            });

            ACTIVE_INSTANCE = inst; // κράτα το καλό instance
            media.innerHTML = '';
            media.appendChild(iframe);
            return true;
          } catch {}
        }
        return false;
      }

      links.forEach((link, idx) => {
        const videoId = getVideoId(link);
        if (!videoId || videoId.length !== 11) return;

        const card = document.createElement('div');
        card.className = 'video-card';

        const media = document.createElement('div');
        media.className = 'video-media';

        const thumb = document.createElement('div');
        thumb.className = 'video-thumb';
        thumb.dataset.videoId = videoId;
        thumb.dataset.idx = String(idx);
        thumb.setAttribute('role', 'button');
        thumb.setAttribute('tabindex', '0');
        thumb.setAttribute('aria-label', 'Play video');

        const title = document.createElement('div');
        title.className = 'video-title';
        title.id = `title-${idx}`;
        title.textContent = '...';

        async function onPlay() {
          if (media.querySelector('iframe') || media.querySelector('.mini-error')) return;

          // δείξε μικρό loading state
          const overlay = document.createElement("div");
          overlay.className = "mini-error";
          overlay.style.color = "rgba(255,255,255,.9)";
          overlay.innerHTML = "Φόρτωση...";
          media.innerHTML = "";
          media.appendChild(overlay);

          const ok = await loadIframeWithFallback(media, videoId);
          if (!ok) {
            const ytUrl = `https://www.youtube.com/watch?v=${videoId}`;
            media.innerHTML = `
              <div class="mini-error">
                ❌ Δεν γίνεται embed από Invidious τώρα.<br>
                <a href="${ytUrl}" target="_blank" rel="noopener noreferrer">Άνοιγμα στο YouTube</a>
              </div>`;
          }
        }

        thumb.addEventListener('click', onPlay);
        thumb.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            onPlay();
          }
        });

        media.appendChild(thumb);
        card.appendChild(media);
        card.appendChild(title);
        container.appendChild(card);

        observer.observe(thumb);
      });

      // Boost πρώτα 3 (thumbs + titles)
      const firstBoost = Math.min(3, links.length);
      for (let i = 0; i < firstBoost; i++) {
        const thumb = container.querySelector(`.video-thumb[data-idx="${i}"]`);
        if (thumb) observer.observe(thumb);
      }
    })();
  </script>
</body>
</html>
