<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>YouTube Videos - Built-in AdBlock</title>

  <style>
    /* ΤΑ ΙΔΙΑ STYLES ΠΟΥ ΕΙΧΕΣ - ΤΑ ΚΡΑΤΑΜΕ ΟΛΑ ΙΔΙΑ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      color: #ffffff;
      text-align: center;
      margin-bottom: 26px;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 1px;
    }

    #video-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      max-width: 1680px;
      margin: 0 auto;
    }

    .video-card {
      background-color: #2d2d2d;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 12px rgba(0,0,0,0.4);
    }

    .video-media {
      position: relative;
      width: 100%;
      padding-bottom: 62.5%;
      background: #000;
    }

    .video-media iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #000;
    }

    .video-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.05) contrast(1.05);
    }

    .video-thumb::after {
      content: "";
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      box-shadow: 0 6px 16px rgba(0,0,0,0.35);
      position: absolute;
    }
    .video-thumb::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 18px solid #fff;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      transform: translateX(4px);
      z-index: 1;
    }
    .video-thumb:hover::after { background: rgba(0,0,0,0.7); }

    .video-title {
      color: #fff;
      padding: 10px 12px 12px;
      font-size: 0.95rem;
      line-height: 1.25rem;
      font-weight: 400;
      opacity: 0.95;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: calc(1.25rem * 2);
    }

    .loading, .error-message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: #ffffff;
      background-color: #2d2d2d;
      border-radius: 12px;
      font-size: 1.1rem;
    }
    .error-message {
      color: #ff6b6b;
      border: 1px solid #ff6b6b;
    }

    @media screen and (max-width: 1024px) {
      #video-container { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }

    @media screen and (max-width: 480px) {
      body { padding: 10px; }
      #video-container { grid-template-columns: 1fr; gap: 15px; }
      h1 { margin-bottom: 18px; }
    }

    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #2d2d2d; }
    ::-webkit-scrollbar-thumb { background: #666; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #888; }
  </style>
  
  <!-- Φόρτωση της adblock library από το CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@cliqz/adblocker/dist/umd/adblocker.umd.min.js"></script>
</head>

<body>
  <h1>YouTube Videos (Built-in AdBlock)</h1>

  <div id="video-container">
    <div class="loading">Φόρτωση βίντεο...</div>
  </div>

  <script>
    function getVideoId(url) {
      try {
        url = url.trim();
        const patterns = [
          /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
          /youtube\.com\/watch\?.+&v=([^&\n?#]+)/
        ];
        for (let pattern of patterns) {
          const match = url.match(pattern);
          if (match) return match[1];
        }
        const urlObj = new URL(url);
        return urlObj.searchParams.get('v');
      } catch (e) {
        console.error('Error parsing URL:', url);
        return null;
      }
    }

    // Χρήση youtube-nocookie (privacy friendly)
    const EMBED_BASE = "https://www.youtube-nocookie.com/embed/";

    function buildEmbedSrc(videoId) {
      const params = new URLSearchParams({
        autoplay: "1",
        rel: "0",
        modestbranding: "1",
        playsinline: "1",
        iv_load_policy: "3" // Απενεργοποιεί τα annotations
      });
      return `${EMBED_BASE}${videoId}?${params.toString()}`;
    }

    // ---- Αρχικοποίηση adblocker ----
    let adblockerEngine = null;
    
    async function initAdBlocker() {
      try {
        // Φόρτωση των adblock lists (EasyList, κλπ)
        const { FiltersEngine, Request } = window.Adblocker;
        
        // Δημιουργία engine με τις standard adblock lists
        adblockerEngine = await FiltersEngine.fromLists(fetch, [
          'https://easylist.to/easylist/easylist.txt',
          'https://easylist.to/easylist/easyprivacy.txt'
        ]);
        
        console.log('✅ AdBlock engine loaded successfully');
      } catch (error) {
        console.error('❌ Failed to load adblock engine:', error);
      }
    }

    // Ξεκινάμε τον adblocker μόλις φορτώσει η σελίδα
    initAdBlocker();

    // Συνάρτηση που ελέγχει αν ένα URL είναι διαφήμιση
    function isAdUrl(url) {
      if (!adblockerEngine) return false;
      
      try {
        const { Request } = window.Adblocker;
        const request = Request.fromRawDetails({
          url: url,
          type: 'script' // ή 'xmlhttprequest' ανάλογα
        });
        
        return adblockerEngine.match(request) !== null;
      } catch {
        return false;
      }
    }

    // ---- Titles (oEmbed) ----
    const titleCache = new Map();
    async function fetchTitle(videoId) {
      if (titleCache.has(videoId)) return titleCache.get(videoId);

      const oembedUrl =
        `https://www.youtube.com/oembed?url=${encodeURIComponent("https://www.youtube.com/watch?v=" + videoId)}&format=json`;

      try {
        const res = await fetch(oembedUrl);
        if (!res.ok) throw new Error("oEmbed failed");
        const data = await res.json();
        const title = (data && data.title) ? data.title : "YouTube Video";
        titleCache.set(videoId, title);
        return title;
      } catch {
        const fallback = "YouTube Video";
        titleCache.set(videoId, fallback);
        return fallback;
      }
    }

    fetch('data/links.txt')
      .then(response => {
        if (!response.ok) {
          throw new Error(`Το αρχείο data/links.txt δεν βρέθηκε (Status: ${response.status})`);
        }
        return response.text();
      })
      .then(text => {
        const container = document.getElementById('video-container');
        container.innerHTML = '';

        const links = text.split('\n')
          .map(line => line.trim())
          .filter(line => line && !line.startsWith('#'));

        if (links.length === 0) {
          container.innerHTML = '<div class="error-message">Δεν βρέθηκαν links στο αρχείο</div>';
          return;
        }

        const observer = new IntersectionObserver((entries, obs) => {
          for (const entry of entries) {
            if (!entry.isIntersecting) continue;

            const thumb = entry.target;
            const videoId = thumb.dataset.videoId;
            const titleEl = document.getElementById(`title-${thumb.dataset.idx}`);

            if (!thumb.dataset.thumbLoaded) {
              const img = document.createElement('img');
              const maxres = `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
              const hq = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
              img.loading = "lazy";
              img.decoding = "async";
              img.src = maxres;
              img.onerror = () => { img.src = hq; };
              thumb.appendChild(img);
              thumb.dataset.thumbLoaded = "1";
            }

            if (titleEl && !titleEl.dataset.titleLoaded) {
              titleEl.dataset.titleLoaded = "1";
              fetchTitle(videoId).then(t => { titleEl.textContent = t; });
            }

            obs.unobserve(thumb);
          }
        }, {
          root: null,
          rootMargin: "500px",
          threshold: 0.01
        });

        links.forEach((link, idx) => {
          const videoId = getVideoId(link);
          if (!videoId || videoId.length !== 11) return;

          const card = document.createElement('div');
          card.className = 'video-card';

          const media = document.createElement('div');
          media.className = 'video-media';

          const thumb = document.createElement('div');
          thumb.className = 'video-thumb';
          thumb.dataset.videoId = videoId;
          thumb.dataset.idx = String(idx);
          thumb.setAttribute('role', 'button');
          thumb.setAttribute('tabindex', '0');
          thumb.setAttribute('aria-label', 'Play video');

          function loadIframe() {
            if (media.querySelector('iframe')) return;
            const iframe = document.createElement('iframe');
            iframe.src = buildEmbedSrc(videoId);
            iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;
            iframe.loading = "eager";
            iframe.title = "YouTube video player";
            
            // Παρακολούθηση φόρτωσης του iframe για μπλοκάρισμα διαφημίσεων
            iframe.onload = function() {
              try {
                // Προσπάθεια να μπλοκάρουμε διαφημιστικά scripts μέσα στο iframe
                const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                if (iframeDoc) {
                  const observer = new MutationObserver(function(mutations) {
                    mutations.forEach(function(mutation) {
                      mutation.addedNodes.forEach(node => {
                        if (node.nodeType === 1) { // Element node
                          // Έλεγχος για διαφημιστικά στοιχεία
                          if (node.src && isAdUrl(node.src)) {
                            node.remove();
                          }
                        }
                      });
                    });
                  });
                  
                  observer.observe(iframeDoc.body, {
                    childList: true,
                    subtree: true
                  });
                }
              } catch (e) {
                // Cross-origin restrictions - δεν μπορούμε να κάνουμε πολλά
                console.log('Cannot access iframe content due to same-origin policy');
              }
            };
            
            media.innerHTML = '';
            media.appendChild(iframe);
          }

          thumb.addEventListener('click', loadIframe);
          thumb.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              loadIframe();
            }
          });

          media.appendChild(thumb);

          const title = document.createElement('div');
          title.className = 'video-title';
          title.id = `title-${idx}`;
          title.textContent = '...';

          card.appendChild(media);
          card.appendChild(title);
          container.appendChild(card);

          observer.observe(thumb);
        });

        const firstBoost = Math.min(3, links.length);
        for (let i = 0; i < firstBoost; i++) {
          const thumb = container.querySelector(`.video-thumb[data-idx="${i}"]`);
          if (thumb) observer.observe(thumb);
        }
      })
      .catch(error => {
        document.getElementById('video-container').innerHTML =
          `<div class="error-message">
              ❌ Σφάλμα: ${error.message}<br><br>
              Βεβαιώσου ότι:<br>
              1. Το αρχείο data/links.txt υπάρχει στο repository<br>
              2. Το index.html είναι στο root φάκελο<br>
              3. Τα links είναι σωστά (ένα σε κάθε γραμμή)
           </div>`;
      });
  </script>
</body>
</html>
