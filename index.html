<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube - AdBlock Parameters</title>
  <style>
    /* ΑΚΡΙΒΩΣ ΤΑ ΙΔΙΑ STYLES ΜΕ ΠΡΙΝ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
    }
    h1 {
      color: #ffffff;
      text-align: center;
      margin-bottom: 26px;
    }
    #video-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      max-width: 1680px;
      margin: 0 auto;
    }
    .video-card {
      background-color: #2d2d2d;
      border-radius: 12px;
      overflow: hidden;
    }
    .video-media {
      position: relative;
      width: 100%;
      padding-bottom: 62.5%;
      background: #000;
    }
    .video-media iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    .video-thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      background: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .video-thumb::after {
      content: "";
      width: 64px;
      height: 64px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      position: absolute;
    }
    .video-thumb::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 18px solid #fff;
      border-top: 12px solid transparent;
      border-bottom: 12px solid transparent;
      transform: translateX(4px);
      z-index: 1;
    }
    .video-title {
      color: #fff;
      padding: 10px 12px;
    }
    @media (max-width: 1024px) { #video-container { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { #video-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <h1>YouTube Videos (AdBlock Parameters)</h1>
  <div id="video-container">Φόρτωση...</div>

  <script>
    function getVideoId(url) {
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/);
      return match ? match[1] : null;
    }

    // Αυτές οι παράμετροι βοηθούν στο μπλοκάρισμα διαφημίσεων
    function buildEmbedUrl(videoId) {
      const params = new URLSearchParams({
        autoplay: '0',
        rel: '0',
        modestbranding: '1',
        iv_load_policy: '3',      // Απενεργοποιεί τα annotations
        fs: '1',
        playsinline: '1',
        disablekb: '0',
        enablejsapi: '0',          // Απενεργοποιεί το JS API (λιγότερες διαφημίσεις)
        origin: window.location.origin
      });
      
      // Χρησιμοποιούμε youtube-nocookie για privacy και λιγότερες διαφημίσεις
      return `https://www.youtube-nocookie.com/embed/${videoId}?${params.toString()}`;
    }

    fetch('data/links.txt')
      .then(r => r.text())
      .then(text => {
        const container = document.getElementById('video-container');
        container.innerHTML = '';
        
        const links = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
        
        links.forEach((link, idx) => {
          const videoId = getVideoId(link);
          if (!videoId) return;

          const card = document.createElement('div');
          card.className = 'video-card';

          const media = document.createElement('div');
          media.className = 'video-media';

          const thumb = document.createElement('div');
          thumb.className = 'video-thumb';
          
          const img = document.createElement('img');
          img.src = `https://i.ytimg.com/vi/${videoId}/maxresdefault.jpg`;
          img.onerror = () => { img.src = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`; };
          thumb.appendChild(img);

          function loadIframe() {
            if (media.querySelector('iframe')) return;
            const iframe = document.createElement('iframe');
            iframe.src = buildEmbedUrl(videoId);
            iframe.allow = "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture";
            iframe.allowFullscreen = true;
            media.innerHTML = '';
            media.appendChild(iframe);
          }

          thumb.addEventListener('click', loadIframe);
          media.appendChild(thumb);

          const title = document.createElement('div');
          title.className = 'video-title';
          title.textContent = `Video ${idx + 1}`;

          card.appendChild(media);
          card.appendChild(title);
          container.appendChild(card);
        });
      })
      .catch(error => {
        document.getElementById('video-container').innerHTML = 
          `<div class="error-message">Σφάλμα: ${error.message}</div>`;
      });
  </script>
</body>
</html>
